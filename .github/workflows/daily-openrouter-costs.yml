name: Daily OpenRouter Cost Tracking

on:
  schedule:
    - cron: "0 12 * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  track-openrouter-costs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run OpenRouter cost tracker
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          python track_openrouter_costs.py

      - name: Commit updated CSV files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/*.csv

          git commit -m "Update OpenRouter cost history" || echo "No changes to commit"
          git push
